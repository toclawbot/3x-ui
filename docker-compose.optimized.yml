services:
  3xui:
    build:
      context: .
      dockerfile: ./Dockerfile.optimized
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: 3xui_app
    # hostname: yourhostname <- optional
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
      TZ: "Asia/Shanghai"
    tty: true
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2053/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
